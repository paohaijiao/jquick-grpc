syntax = "proto3";

package com.github.paohaijiao.grpc.test;

option java_package = "com.github.paohaijiao.grpc.test";
option java_outer_classname = "GreeterProto";

service Greeter {
  rpc SayHello (HelloRequest) returns (HelloReply) {}
}

message HelloRequest {
  string name = 1;
}

message HelloReply {
  string message = 1;
}